<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salotti-Controll</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="img/icons8-raise-a-hand-to-answer-96.png"
    />
  </head>
  <body class="loginm">
    <main class="contlo">
      <form id="form">
        <img src="img/icons8-lock.svg" alt="logo" class="logo1" />
        <h2 class="tilo">Salotti-Controll</h2>
        <h4 class="subtitulo">Controle de Alunos</h4>
        <input
          type="text"
          id="usuario"
          placeholder="Usuário"
          class="inp"
        /><br />
        <input
          type="password"
          id="senha"
          placeholder="Senha"
          class="inp1"
        /><br />
        <button 
          class="btn1"
          id="btnlogin"
        >
          Entrar
        </button>
        <p class="info">Usuario:admin Senha:1234</p>
        <a onclick="renderLogin()" class="nao">Não tem conta? Cadastre-se</a>
      </form>
    </main>
    <script src="login.js"></script>
  </body>
</html>
