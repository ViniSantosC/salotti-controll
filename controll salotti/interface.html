<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salotti Controll</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="img/icons8-raise-a-hand-to-answer-96.png"
    />
  </head>
  <body class="index">
    <header>
      <div class="flex">
        <div class="hd">
          <div>
            <img src="img/logovfinal (1).png" alt="logo">
          </div>
          <div>
            <h1 class="h1">Salotti-Controll</h1>
            <p>Gerenciamento de alunos</p></div>
          </div>
        </div>
        <div>
            <a class="btn" href="login.html">
            <img src="img/sair (2).png" alt="sair" />
            <span>Sair</span>
            </a>
        </div>
      </div>
    </header>
    <main>
      <div class="cards" id="cadasal">
          <div class="card">
            <div class="icon">
              <h2>👤</h2>
              </div>
            <div>
              <h1 class="t1">?</h1>
              <p>Alunos</p>
            </div>
          </div>
        <div class="card">
          <div class="icon">
            <h2>📖</h2>
          </div>
          <div>
            <h1 class="t1">?</h1>
            <p>Materias</p>
          </div>
        </div>
        <div class="card">
          <div class="icon">
            <h2>👥</h2>
          </div>
          <div>
            <h1 class="t1">?</h1>
            <p>Turmas</p>
          </div>
        </div>
        <div class="card">
          <div>
            <button onclick="aparece()">
              <span>+</span>
            </button>
          </div>
        <div>
          <h1 class="t2">Novo Aluno</h1>
          <p>Clique aqui para Cadastra</p>
        </div>
        </div>
      </div>
      <div class="materia">
        <div class="cafe">
          <img src="img/icons8-open-book-90.png" alt="icon">
          <p>Materías</p>
        </div>
        <div class="leite">
          <input type="text" placeholder="Nova Materia">
          <button>+</button>
        </div>
      </div>
      <div class="cadas desaparece" id="cadastroal">
        <div class="al">
          <img src="img/icons8-graduate-96.png" alt="icon">
          <h2>Cadastrar Novo Aluno</h2>
        </div>
        <div class="c1">
          <div>
            <label for="nome">NOME</label><br>
            <input type="text" class="nome" placeholder="Nome do Aluno">
          </div>
          <div>
            <label for="turma">TURMA</label><br>
            <input type="text" class="turma" placeholder="Ex:3DM">
          </div>
          <div>
            <label for="ra">RA</label><br>
            <input type="text" class="ra" placeholder="Ex:00011....">
          </div>
        </div>
        <div class="c1">
          <div>
            <label for="forte">🌟 PONTOS FORTES</label><br>
            <input type="text" class="forte" placeholder="Descreva os pontos forte do Aluno ">
          </div>
          <div>
            <label for="fraco">⚠️ PONTOS FRACO</label><br>
            <input type="text" class="fraco" placeholder="Descreva os pontos fraco do Aluno ">
          </div>
        </div>
        <button>Cadastra Aluno</button>
      </div>

    </main>
    <script src="script2.js"></script>
  </body>
</html>
