<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salotti Controll</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="img/icons8-raise-a-hand-to-answer-96.png"
    />
  </head>
  <body class="index">
    <header>
      <div class="mae">
        <div class="lado">
          <img src="img/logo.png" alt="logo" />
          <h1>Salotti Controll</h1>
        </div>
        <a class="btn" href="login.html">
          <img src="img/sair (2).png" alt="sair" />
          <span>Sair</span>
        </a>
      </div>
    </header>
    <main>
      <div class="conteudo">
        <h2>Novo Aluno</h2>
        <div>
          <div class="lado1">
          <input type="text" class="inp2" id="nome" placeholder="Nome" />
          <input type="text" class="inp3" id="turma" placeholder="Turma" />
          <input type="text" class="inp4" id="ra" placeholder="Ra" />
          </div>
          <div>
          <input type="text" class="inp5" id="forte" placeholder="Pontos Fortes (ex: boa leitura, criativo, participativo...)" />
          <input type="text" class="inp6" id="fraco" placeholder="Pontos Fracos (ex: dificuldade em matemática, timidez...)" />
          </div>
          <button id="btnadicionar" class="btnadiciona">+ Adicionar</button>
        </div>
      </div>
      <div id="listaalunos"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
